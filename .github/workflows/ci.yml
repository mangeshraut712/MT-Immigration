name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Scan for committed secrets
        uses: gitleaks/gitleaks-action@v2

  lint-and-build:
    needs: secrets-scan
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        node-version: [20.x]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install

      - name: Check AI configuration wiring
        run: npm run check:ai-config

      - name: Verify FastAPI syntax
        run: python3 -m py_compile api/agents.py
      
      - name: Run linter
        run: npm run lint

      - name: Run typecheck
        run: npm run typecheck
      
      - name: Build project
        run: npm run build
      
      - name: Smoke test built app
        env:
          PORT: 3000
        run: |
          npm run start > /tmp/mt-immigration-next.log 2>&1 &
          APP_PID=$!
          trap 'kill $APP_PID || true' EXIT
          node scripts/smoke-release.mjs http://127.0.0.1:3000
